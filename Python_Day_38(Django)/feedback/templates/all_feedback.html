<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Все отзывы</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #333;
    }

    .feedback-item {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 5px;
    }

    .feedback-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: #666;
    }

    .name {
      font-weight: bold;
      color: #333;
    }

    .date {
      font-size: 0.9em;
    }

    .email {
      color: #007bff;
    }

    .message {
      margin-top: 10px;
      line-height: 1.5;
    }

    .no-feedback {
      text-align: center;
      color: #666;
      padding: 30px;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #007bff;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Все отзывы</h1>

    {% if feedbacks %}
    {% for feedback in feedbacks %}
    <div class="feedback-item">
      <div class="feedback-header">
        <span class="name">{{ feedback.name }}</span>
        <span class="date">{{ feedback.created_at|date:"d.m.Y H:i" }}</span>
      </div>
      <div class="email">{{ feedback.email }}</div>
      <div class="message">{{ feedback.message }}</div>
    </div>
    {% endfor %}
    {% else %}
    <div class="no-feedback">
      <p>Пока нет ни одного отзыва.</p>
      <p>Будьте первым, кто оставит отзыв!</p>
    </div>
    {% endif %}

    <a href="{% url 'home' %}" class="back-link">← На главную</a>
  </div>
</body>

</html>
