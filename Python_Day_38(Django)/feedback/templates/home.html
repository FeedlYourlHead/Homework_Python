<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Главная страница</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #333;
    }

    .menu {
      margin-top: 20px;
    }

    .menu a {
      display: inline-block;
      margin-right: 20px;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .menu a:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Добро пожаловать на наш сайт!</h1>
    <p>Это простое Django приложение с формой обратной связи.</p>

    <div class="menu">
      <a href="{% url 'feedback_form' %}">Оставить отзыв</a>
      <a href="{% url 'all_feedback' %}">Все отзывы</a>
    </div>
  </div>
</body>

</html>
