<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MyGarage{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.home') }}">MyGarage</a>
            <div class="navbar-nav">
                {% if current_user.is_authenticated %}
                    <span class="nav-link text-light">{{ current_user.username }}</span>
                    <a class="nav-link" href="{{ url_for('main.dashboard') }}">Гараж</a>
                    <a class="nav-link" href="{{ url_for('main.logout') }}">Выход</a>
                {% else %}
                    <a class="nav-link" href="{{ url_for('main.login') }}">Вход</a>
                    <a class="nav-link" href="{{ url_for('main.register') }}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container py-4">
        {% for cat, msg in get_flashed_messages(with_categories=true) %}
            <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
